abi:
  package: thru.example.guestbook
  name: Guestbook V1
  abi-version: 1
  package-version: '1.0.0'
  description: Minimal event-only guestbook program for Thru Alphanet
  imports: []
  options:
    program-metadata:
      root-types:
        instruction-root: GuestbookInstruction
        account-root: null
        errors: null
        events: GuestbookEvent
types:
- name: GuestbookInstruction
  kind:
    struct:
      packed: true
      aligned: 0
      comment: null
      fields:
      - name: instruction_type
        field-type:
          primitive: u32
      - name: message_len
        field-type:
          primitive: u32
      - name: message
        field-type:
          array:
            packed: false
            aligned: 0
            comment: null
            size:
              field-ref:
                path:
                - message_len
            element-type:
              primitive: u8
            jagged: false
- name: GuestbookEvent
  kind:
    struct:
      packed: true
      aligned: 0
      comment: null
      fields:
      - name: event_type
        field-type:
          primitive: u64
      - name: message
        field-type:
          array:
            packed: false
            aligned: 0
            comment: null
            size:
              literal:
                u64: 22
            element-type:
              primitive: u8
            jagged: false
