abi:
  package: thru.example.guestbook
  name: Guestbook V2
  abi-version: 1
  package-version: '2.0.0'
  description: Stateful Guestbook program for Thru Alphanet
  imports: []
  options:
    program-metadata:
      root-types:
        instruction-root: GuestbookPostInstruction
        account-root: GuestbookAccount
        errors: null
        events: GuestbookEvent
types:
- name: GuestbookPostInstruction
  kind:
    struct:
      packed: true
      aligned: 0
      comment: null
      fields:
      - name: instruction_type
        field-type:
          primitive: u32
      - name: account_index
        field-type:
          primitive: u16
      - name: message_len
        field-type:
          primitive: u32
      - name: message
        field-type:
          array:
            packed: false
            aligned: 0
            comment: null
            size:
              field-ref:
                path:
                - message_len
            element-type:
              primitive: u8
            jagged: false
- name: GuestbookAccount
  kind:
    struct:
      packed: true
      aligned: 0
      comment: null
      fields:
      - name: message_count
        field-type:
          primitive: u64
      - name: message_len
        field-type:
          primitive: u32
      - name: message
        field-type:
          array:
            packed: false
            aligned: 0
            comment: null
            size:
              literal:
                u64: 256
            element-type:
              primitive: u8
            jagged: false
- name: GuestbookEvent
  kind:
    struct:
      packed: true
      aligned: 0
      comment: null
      fields:
      - name: event_type
        field-type:
          primitive: u64
      - name: message
        field-type:
          array:
            packed: false
            aligned: 0
            comment: null
            size:
              literal:
                u64: 27
            element-type:
              primitive: u8
            jagged: false
